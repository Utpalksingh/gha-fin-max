name: input demo check
on: 
  workflow_dispatch:
    inputs:
      environment:
        description: "choose your environment"
        required: true
        default: "test"
jobs:
  input_demo:
    runs-on: ubuntu-latest
    steps:
      - name: env check for job
        run: echo "current job is being run on ${{ github.event.inputs.environment }}"
      - name: check again
        run: echo "envn is ${{ inputs.environment }}"
