name: output use demo
on: push
jobs:
  output-job1:
    runs-on: ubuntu-latest
    steps:
      - name: check version
        id: oj1
        run: echo "version=0.0.1" >> "$GITHUB_OUTPUT"

      - name: print the output value here
        run: echo "current version is ${{ steps.oj1.outputs.version}}"
