name: output use demo
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version_lat: ${{ steps.build-ver.outputs.version}}
    steps:
      - name: populate version
        id: build-ver
        run: echo "version=0.0.1" >> "$GITHUB_OUTPUT"
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: deploy the app
        run: echo "deployed version is ${{ needs.build.outputs.version_lat}}"
        
